# TEMPLATE — CyCIF / t-CyCIF (Sorger lab cyclic IF) or Orion (RareCyte same-section)
# Same code path as CODEX (OmeTiffReader). Copy and edit values marked TODO.
#
# Key differences from a CODEX dataset:
#   - CyCIF panels are study-specific (no commercial reagent kit). Resolve
#     marker names from the dataset's own QuPath project / panel CSV.
#   - For Orion: H&E is captured in the SAME tissue section as the IF channels
#     (often as additional channels in the same OME-TIFF). Set
#     `registration.strategy: identity` to skip cross-section warping.

dataset_id: TODO-dataset-id
modality: cycif                   # or `orion`
description: |
  TODO short description (cohort, n patients, paired H&E source).

paths:
  raw_subdir: TODO-dataset-id
  preproc_subdir: TODO-dataset-id

unpack:
  archives: []                    # CyCIF data is often hosted on AWS / Synapse — no archive
  visium_glob: null

index:
  codex_glob: "*.ome.tif"
  he_subdir: he_raw
  he_suffixes: [".tif", ".tiff", ".ome.tif", ".svs", ".ndpi"]
  patient_id_strip_suffixes: []
  patient_id_strip_version_re: null

reference_channel:
  match_any: ["DAPI", "Hoechst", "DNA"]
  fallback_index: 0

he_grayscale:
  method: invert_value

registration:
  strategy: affine_loftr           # set to `identity` for Orion same-section data
  thumb_target_downsample: 32
  loftr_max_side: 1024
  ransac_residual_px: 4.0
  min_inliers: 8

panel:
  source: csv                      # CyCIF: typically a per-slide channel metadata CSV
  csv_path: TODO/path/to/panel.csv

panel_verify:
  expected_dapi_at_index_0: true
  expected_total_channels: null
  cycle_structure_constant: null   # CyCIF cycles are study-specific

patchify:
  patch_px: 512
  stride_px: 512
  tissue_frac_min: 0.35
  max_patches_per_slide: 256
  preview_grid: 8
  storage:
    he_dtype: uint8
    codex_dtype: uint8
    compression: lzf
