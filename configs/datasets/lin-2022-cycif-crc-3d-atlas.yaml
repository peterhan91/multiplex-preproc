# Dataset config — Lin 2023 *Cell* 3D CRC atlas (t-CyCIF + paired H&E)
# Source: AWS s3://lin-2021-crc-atlas/data/ (anonymous LIST + GET)
# Reference: github.com/labsyspharm/CRC_atlas_2022 README

dataset_id: lin-2022-cycif-crc-3d-atlas
modality: cycif
description: |
  Lin et al. 2023 Cell — 17 CRC patients (CRC1: 47 sections for 3D reconstruction;
  CRC2-17: 16 patients 2D). t-CyCIF panel (~30+ markers, lab-prepared cyclic IF).
  Paired H&E whole-slide for the same blocks. Open AWS bucket, MIT analysis repo.

paths:
  raw_subdir: lin-2022-cycif-crc-3d-atlas
  preproc_subdir: lin-2022-cycif-crc-3d-atlas

unpack:
  archives: []                     # nothing to unpack — direct AWS pulls
  visium_glob: null

# Download is via AWS S3 anonymous listing (handled by a future fetch step)
fetch:
  source: aws_s3
  bucket: lin-2021-crc-atlas
  prefix: data/
  files_per_patient: 2             # CyCIF OME-TIFF + H&E OME-TIFF
  cycif_filename_re: '^CRC[0-9]+\.ome\.tif$|^WD-[0-9]+-[0-9]+\.ome\.tif$'
  he_filename_re: '^WD-[0-9]+-[0-9]+\.ome\.tif$'   # H&E shares WD- prefix in CRC1 layout

index:
  codex_glob: "CRC[0-9][0-9].ome.tif"  # CyCIF cubes for CRC02-17 only (the trailing exact dot+ext excludes CRC13-HE.ome.tif)
  he_root_base: raw                # H&E sits in raw/<dataset>/ (direct S3 download)
  he_subdir: ""                    # no extra subdir under raw/<dataset>/
  he_suffixes: [".tif", ".tiff"]
  he_filename_re: '-HE\.ome\.tif$' # disambiguate H&E from CyCIF cube (both contain sample id)
  patient_id_strip_suffixes: []
  patient_id_strip_version_re: null

reference_channel:
  match_any: ["DAPI", "Hoechst", "DNA"]
  fallback_index: 0

he_grayscale:
  method: invert_value

registration:
  strategy: affine_loftr
  thumb_target_downsample: 32
  loftr_max_side: 1024
  ransac_residual_px: 4.0
  min_inliers: 8

panel:
  source: csv                      # cohort-level panel CSV (HTAN channel metadata)
  # Path forms supported: raw://<rel>, preproc://<rel>, /abs/path, or bare relative
  # (legacy, resolved against preproc/<dataset>/).
  csv_path: "raw://CRC202105 HTAN channel metadata.csv"
  fallback_constant: null          # no published constant analogue

panel_verify:
  expected_dapi_at_index_0: true   # accepts DAPI/Hoechst/DNA at index 0
  expected_total_channels: 36      # from CRC202105 HTAN channel metadata.csv (verified 2026-04-26)
  cycle_structure_constant: null   # t-CyCIF panels are study-specific; no published cycle constant

patchify:
  patch_px: 512
  stride_px: 512
  tissue_frac_min: 0.35
  max_patches_per_slide: 256
  preview_grid: 8
  storage:
    he_dtype: uint8
    codex_dtype: uint8
    compression: lzf
