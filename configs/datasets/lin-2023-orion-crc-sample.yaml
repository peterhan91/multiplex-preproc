# Dataset config — Lin 2023 *Nat Cancer* Orion CRC SAMPLE (single CRC33_01 pair)
# Source: AWS s3://lin-2023-orion-crc/data/CRC33_01/ (anonymous, open)
# Purpose: validate IdentityStrategy + Orion same-section pipeline on real data.

dataset_id: lin-2023-orion-crc-sample
modality: orion
description: |
  Single Orion CyCIF cube (CRC33_01) + same-section H&E from Lin et al.
  2023 *Nat Cancer* "high-plex IF + traditional histology of the same
  tissue section". 47 GB IF cube + 0.39 GB H&E (separate WSI-class
  -registered.ome.tif file). Used to validate IdentityStrategy: H&E and
  IF are pixel-aligned by Orion design, no cross-section LoFTR needed.

paths:
  raw_subdir: lin-2023-orion-crc-sample
  preproc_subdir: lin-2023-orion-crc-sample

unpack:
  archives: []
  visium_glob: null

index:
  codex_glob: "*-orion.ome.tiff"   # only the Orion cube; excludes -he.ome.tif
  he_root_base: raw                # H&E sits beside the cube in raw/
  he_subdir: ""
  he_suffixes: [".tif", ".tiff"]
  he_filename_re: '-he\.ome\.tif$' # disambiguate from cube
  patient_id_strip_filename_suffix_re: '-orion$'  # CRC33_01-orion → CRC33_01
  patient_id_strip_suffixes: []
  patient_id_strip_version_re: null

reference_channel:
  # Orion has DAPI in the IF cube; same-section H&E doesn't need a separate ref
  # channel for registration (IdentityStrategy skips matching) but 02_thumbs
  # still needs one for the QC thumbnail.
  match_any: ["DAPI", "Hoechst", "DNA"]
  fallback_index: 0

he_grayscale:
  method: invert_value

registration:
  strategy: identity               # CRITICAL — Orion is same-section, NO LoFTR/ORB needed
  thumb_target_downsample: 32
  loftr_max_side: 1024             # ignored by IdentityStrategy
  ransac_residual_px: 4.0          # ignored
  min_inliers: 8                   # ignored

panel:
  source: ome_metadata             # Orion cubes have channel names in OME-XML
  fallback_constant: null

panel_verify:
  expected_dapi_at_index_0: false  # Orion DAPI may be elsewhere; relax
  expected_total_channels: null    # variable; depends on panel version
  cycle_structure_constant: null

patchify:
  patch_px: 512
  stride_px: 512
  tissue_frac_min: 0.35
  max_patches_per_slide: 256
  preview_grid: 8
  storage:
    he_dtype: uint8
    codex_dtype: uint8
    compression: lzf
