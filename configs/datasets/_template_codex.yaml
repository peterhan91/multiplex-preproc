# TEMPLATE — CODEX (Akoya) / PhenoCycler dataset
# Copy to <dataset_id>.yaml and edit values marked TODO.

dataset_id: TODO-dataset-id
modality: codex                    # or `phenocycler`
description: |
  TODO short prose description (cohort, n patients, what's paired).

paths:
  raw_subdir: TODO-dataset-id
  preproc_subdir: TODO-dataset-id

unpack:
  archives:
    # - {src: foo.zip, dst: he_raw, type: zip}
    # - {src: bar.zip, dst: qupath, type: zip-metadata, include_suffixes: ["server.json", "project.qpproj"]}
  visium_glob: null

index:
  codex_glob: "*.ome.tif"
  he_subdir: he_raw
  he_suffixes: [".tif", ".tiff", ".svs", ".ndpi"]
  patient_id_strip_suffixes: []
  patient_id_strip_version_re: null

reference_channel:
  match_any: ["DAPI", "Hoechst", "DNA"]
  fallback_index: 0

he_grayscale:
  method: invert_value

registration:
  strategy: affine_loftr            # set `identity` if same-section
  thumb_target_downsample: 32
  loftr_max_side: 1024
  ransac_residual_px: 4.0
  min_inliers: 8

panel:
  source: csv                       # qupath_v2 | csv | inline | <constant-key>
  csv_path: TODO/path/to/panel.csv
  inline:
    # - DAPI
    # - CD45
    # ...

panel_verify:
  expected_dapi_at_index_0: true
  expected_total_channels: null     # set if known
  cycle_structure_constant: null    # set if a registered cycle structure applies

patchify:
  patch_px: 512
  stride_px: 512
  tissue_frac_min: 0.35
  max_patches_per_slide: 256
  preview_grid: 8
  storage:
    he_dtype: uint8
    codex_dtype: uint8
    compression: lzf
